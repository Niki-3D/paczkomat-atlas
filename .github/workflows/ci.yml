name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm, cache-dependency-path: pnpm-lock.yaml }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      # Note: `next lint` was removed in Next 16. ESLint flat-config migration
      # is tracked separately; reintroduce a lint step once the new config lands.
      - run: pnpm -w build

  api:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: api } }
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --all-extras
      - run: uv run ruff check
      - run: uv run mypy src/
      # Integration tests under tests/api/ require the live stack (db + martin)
      # and are excluded here. Unit-only tests run on every PR; remove the
      # --ignore once the integration suite has a CI service container.
      - run: uv run pytest -q --ignore=tests/api
