name: paczkomat-atlas

services:
  db:
    image: timescale/timescaledb-ha:pg16.6-ts2.17.2-all
    container_name: paczkomat-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TIMESCALEDB_TELEMETRY: "off"
      # pg_cron requires this in shared_preload_libraries (image already loads timescaledb)
      POSTGRES_INITDB_ARGS: "--data-checksums"
    command:
      - postgres
      - -c
      - shared_preload_libraries=timescaledb,pg_cron,pg_stat_statements
      - -c
      - cron.database_name=${POSTGRES_DB}
      - -c
      - cron.timezone=Europe/Warsaw
      - -c
      - max_connections=200
      - -c
      - shared_buffers=512MB
      - -c
      - effective_cache_size=2GB
      - -c
      - work_mem=16MB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - wal_compression=on
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    shm_size: 1gb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  pgbouncer:
    image: edoburu/pgbouncer:v1.23.1-p3
    container_name: paczkomat-pgbouncer
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "200"
      DEFAULT_POOL_SIZE: "25"
      ADMIN_USERS: ${POSTGRES_USER}
      AUTH_TYPE: scram-sha-256
    ports:
      - "6432:5432"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-U", "${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  martin:
    image: ghcr.io/maplibre/martin:v0.16.0
    container_name: paczkomat-martin
    command:
      - --listen-addresses=0.0.0.0:3000
      - --max-feature-count=20000
      - postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    environment:
      RUST_LOG: martin=info,actix_web=warn
    ports:
      - "3001:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # `localhost` inside the alpine-base image resolves to ::1 first and
      # Martin only binds IPv4; use explicit 127.0.0.1.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  api:
    build:
      context: ../../api
      dockerfile: Dockerfile
    container_name: paczkomat-api
    environment:
      # Connect through pgbouncer, not directly to db
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    depends_on:
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  caddy:
    image: caddy:2.8-alpine
    container_name: paczkomat-caddy
    ports:
      - "8080:8080"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
      martin:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
  caddy_data:
  caddy_config:
